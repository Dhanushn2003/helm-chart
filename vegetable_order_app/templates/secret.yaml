apiVersion: {{ .Values.config.apiVersion }}
kind: {{ .Values.secret.kind }}
metadata:
  name: {{ .Values.secret.name }}
  namespace: {{ .Values.service.namespace }}
type: {{ .Values.secret.type }}
data:
  EMAIL_USER: {{ .Values.secret.data.EMAIL_USER }}
  EMAIL_PASS: {{ .Values.secret.data.EMAIL_PASS }}